## Day 23 Track 2 — Full observability stack
## 7 core services + 3 bonus services (pyroscope, langfuse, langfuse-postgres).
## Bonus services start with: docker compose --profile bonus-b1 up -d
## All ports bound to localhost only — no public exposure.

services:
  app:
    build:
      context: ./01-instrument-fastapi/app
      dockerfile: Dockerfile
    container_name: day23-app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: inference-api
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=lab,service.namespace=aicb
      LOG_LEVEL: INFO
      LOG_FILE: /var/log/app/app.log
      # BONUS B1: Enable profiling by setting PYROSCOPE_SERVER_ADDRESS in .env.
      # Docker Compose automatically loads .env into environment variables.
      # Default (no profiling): PYROSCOPE_SERVER_ADDRESS unset/blank.
      PYROSCOPE_SERVER_ADDRESS: ${PYROSCOPE_SERVER_ADDRESS:-}
    depends_on:
      otel-collector:
        condition: service_started
    volumes:
      - ./logs:/var/log/app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [obs]
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: day23-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./02-prometheus-grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./02-prometheus-grafana/prometheus/rules:/etc/prometheus/rules:ro
      - prom-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [obs]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: day23-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./02-prometheus-grafana/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/REPLACE/ME}
    networks: [obs]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: day23-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PW:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./02-prometheus-grafana/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./02-prometheus-grafana/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks: [obs]

  loki:
    image: grafana/loki:3.3.0
    container_name: day23-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./03-tracing-and-logs/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks: [obs]

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: day23-jaeger
    ports:
      - "127.0.0.1:16686:16686"  # UI
      - "127.0.0.1:14250:14250"  # gRPC OTLP-compatible
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks: [obs]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: day23-otel-collector
    ports:
      - "127.0.0.1:4317:4317"  # OTLP gRPC
      - "127.0.0.1:4318:4318"  # OTLP HTTP
      - "127.0.0.1:8888:8888"  # collector self-metrics
    volumes:
      - ./03-tracing-and-logs/otel-collector/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./logs:/var/log/app:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    networks: [obs]

  day19-stub:
    image: python:3.12-slim
    container_name: day23-day19-stub
    working_dir: /app
    command: sh -c "pip install prometheus_client requests && python monitor-day19-vector-store.py"
    volumes:
      - ./05-integration:/app
    ports:
      - "127.0.0.1:9101:9101"
    networks: [obs]
    restart: unless-stopped

  day20-stub:
    image: python:3.12-slim
    container_name: day23-day20-stub
    working_dir: /app
    command: sh -c "pip install prometheus_client requests && python monitor-day20-llama-cpp.py"
    volumes:
      - ./05-integration:/app
    ports:
      - "127.0.0.1:9102:9102"
    networks: [obs]
    restart: unless-stopped

  # BONUS B1: Pyroscope — continuous CPU profiling
  # Start with: docker compose --profile bonus-b1 up -d
  # Web UI: http://localhost:4040
  pyroscope:
    image: grafana/pyroscope:1.20.3
    container_name: day23-pyroscope
    profiles: [bonus-b1]
    ports:
      - "127.0.0.1:4040:4040"
    volumes:
      - pyroscope_data:/var/lib/pyroscope
    networks: [obs]

  # BONUS B2: Langfuse — LLM-native observability
  # Start with: docker compose --profile bonus-b2 up -d
  # Web UI: http://localhost:3001 (admin@day23.local / langfuse123)
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: day23-langfuse-postgres
    profiles: [bonus-b2]
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse123
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [obs]

  langfuse:
    image: langfuse/langfuse:2
    container_name: day23-langfuse
    profiles: [bonus-b2]
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse123@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: langfuse-dev-secret-for-local-lab-32chars
      NEXTAUTH_URL: http://localhost:3001
      SALT: langfuse-salt-for-hashing-local-dev-32
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: org_01
      LANGFUSE_INIT_ORG_NAME: Day23 Lab
      LANGFUSE_INIT_PROJECT_ID: proj_day23
      LANGFUSE_INIT_PROJECT_NAME: Inference API
      LANGFUSE_INIT_USER_EMAIL: admin@day23.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: langfuse123
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    networks: [obs]

volumes:
  prom-data:
  grafana-data:
  pyroscope_data:
  langfuse_postgres_data:

networks:
  obs:
    driver: bridge
