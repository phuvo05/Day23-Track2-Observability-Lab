# Pyroscope 1.20 config — minimal, uses defaults for everything except ports
# Flags: docker run --rm grafana/pyroscope:1.20.3 --help

server:
  http-listen-address: "0.0.0.0"
  http-port: 4040
  grpc-listen-address: "0.0.0.0"
  grpc-port: 9090

# Store blocks locally (in-memory for lab)
blocks-storage:
  backend: filesystem
  filesystem:
    data-directory: /var/lib/pyroscope/blocks

# No authentication for local lab
auth:
  multitenancy-enabled: false

log:
  level: info
  format: text
