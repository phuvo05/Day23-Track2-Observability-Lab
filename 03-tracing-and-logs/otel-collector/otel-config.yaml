## OpenTelemetry Collector — receivers / processors / exporters
## Anchor: deck §6 (sampling math + semantic conventions).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Self-metrics (Prometheus-scrapeable on :8888 — see prometheus.yml)
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:8888']

  # Log ingestion: tail the app container's stdout JSON logs
  filelog:
    include: [/var/log/app/*.log]
    start_at: beginning
    operators:
      # Parse structlog JSON: body is a raw text line, parse into attributes
      - type: json_parser
        parse_from: body
      # Extract trace/span IDs from the parsed JSON body for correlation
      - type: trace_parser
        trace:
          parse_from: body.trace_id
          regex: "^([0-9a-f]{32})$"
        span:
          parse_from: body.span_id
          regex: "^([0-9a-f]{16})$"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Composite tail-sampling: keep all errors + slow + 1% healthy
  tail_sampling:
    decision_wait: 30s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: keep-errors
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: keep-slow
        type: latency
        latency: { threshold_ms: 2000 }
      - name: probabilistic-1pct
        type: probabilistic
        probabilistic: { sampling_percentage: 1 }

  # Add deployment env to every span/metric resource attribute
  resource:
    attributes:
      - key: deployment.environment
        value: lab
        action: upsert

exporters:
  # Traces → Jaeger via OTLP (bypasses tail sampler — all traces visible)
  otlp/jaeger:
    endpoint: day23-jaeger:4317
    tls:
      insecure: true

  # Logs → Loki via Promtail-compatible HTTP push
  loki:
    endpoint: http://day23-loki:3100/loki/api/v1/push
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [tail_sampling, resource, batch]
      exporters: [otlp/jaeger]

    # Direct trace pipeline (no tail sampling): used for demo so traces
    # appear in Jaeger immediately. The tail_sampling pipeline above
    # handles the real production policy (~3% retention).
    traces/direct:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/jaeger]

    logs:
      receivers: [filelog]
      processors: [resource, batch]
      exporters: [loki]

    metrics:
      receivers: [otlp, prometheus]
      processors: [resource, batch]
      exporters: [debug]

  telemetry:
    logs:
      level: warn
    metrics:
      address: 0.0.0.0:8888
